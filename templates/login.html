<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ProjectHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">ProjectHub</a>
        <div class="navbar-nav">
            <a href="{{ url_for('register') }}" class="nav-link">Sign Up</a>
        </div>
    </nav>

    <div class="container">
        <div class="card center-card">
            <h2 style="margin-bottom: 2rem; text-align: center;">Welcome Back</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="john@example.com" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">I am a</label>
                    <select name="role" class="form-control" required>
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                        <option value="admin">Administrator</option>
                    </select>
                </div>

                <div class="form-actions" style="margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Login to Account</button>
                    <p style="text-align: center; margin-top: 1rem; color: var(--text-muted);">
                        Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary);">Sign up</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
